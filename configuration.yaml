          {% elif is_state('binary_sensor.alarmsensor_5d1b24_music_room_pir', 'off') %}
          music room
          {% elif is_state('binary_sensor.alarmsensor_5d1b24_playroom_pir', 'off') %}
          playroom
          {% elif is_state('binary_sensor.alarmsensor_5d1b24_utility_room_contact', 'off') %}
          utility room          
          {% else %}
          zone not identified
          {% endif %}" 
      - delay: 00:00:02 
      - action: scene.apply
        data:
          entities:
            input_boolean.alarm_set: "off"                  

