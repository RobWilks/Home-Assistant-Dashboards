automation reset SG run today:
  - alias: "sg_run_today_off"    
    id: "automation_3"
    triggers:
      - trigger: time
        at: "02:00:00"
    actions:
      - action: scene.apply
        data:
          entities:
            input_boolean.sg_run_today: "off"
            
automation officeLightOn:
  - alias: "office_light_on"
    id: "automation_4"
    triggers:
      - trigger: time
        at: [sensor.random_on_1, sensor.random_on_2, sensor.random_on_3]
    conditions:
      - and:
          # - condition: template
            # value_template: >
              # {{ states.device_tracker.sm_a505fn.state!='home' }}
          - condition: template
            value_template: >
              {{ states.input_boolean.awayfromhome.state == 'on' }}                 
          - or:
            - condition: sun
              before: sunrise
            - condition: sun
              after: sunset 
              after_offset: "-00:30:00"                     
            - condition: template
              value_template: >
                {{ states.sensor.wilkinsonsolar_site_power.state | float(0) > -0.1 }}                
    actions:
