# automation config
automation test:
  - alias: "test_conditional_trigger"
    id: "automation_0"
    triggers:
      - trigger: state
        entity_id: sensor.wilkinsonsolar_load_power
    condition:
      - condition: template
        value_template: >
          {{ states.input_boolean.newswitch.state=='on' }}
    actions:
      - action: scene.apply
        data:
          entities:
            input_boolean.mytoggle: "on"

automation boost on:
  - alias: "sg_dummy_trigger_on"    
    id: "automation_1"
    triggers:
      - trigger: state
        entity_id: sensor.diff_site_export
    conditions:
      - and:
        - condition: template
          value_template: >
            {{ states.input_boolean.sg_run_today.state=='off' }}
        - condition: template
          value_template: >
            {{ (states.sensor.wilkinsonsolar_charge.state | int(0)) > 80 }}
        - condition: template
          value_template: >
            {{ (states.sensor.diff_site_export.state | float(2)) > 1.0 }} 
        - condition: numeric_state
          entity_id: sun.sun
          attribute: elevation
          above: 5    
    variables:
      notification_action: notify.mobile_app_sm_a505fn
    actions:
# set to SG ready mode 3 solar boost input 1 on input 2 off
      - action: scene.apply
        data:
          entities:
            switch.stiebel_eltron_isg_sg_ready_input_1: "on"
      - action: scene.apply
        data:
          entities:
            switch.stiebel_eltron_isg_sg_ready_input_2: "off"
# activate SG ready function and send message            
      - action: scene.apply
        data:
          entities:
            input_boolean.sg_dummy_switch: "on"
      - action: "{{ notification_action }}"
        data:
          message: "SG ready activated" 
# set flag to show SG ready has been activated once today
      - action: scene.apply
        data:
          entities:
            input_boolean.sg_run_today: "on"

automation boost off:
  - alias: "sg_dummy_trigger_off"    
    id: "automation_2"
    triggers:
      - trigger: time_pattern
        # Match on interval
        minutes: "/5"
    conditions:
      - and:
        - condition: template
          value_template: >
            {{ states.input_boolean.sg_dummy_switch.state=="on" }}
        - or:
          - condition: template
            value_template: >
              {{ (states.sensor.wilkinsonsolar_charge.state | int(0)) < 50 }}
          - condition: template
            value_template: >
              {{ (states.sensor.diff_site_export.state | float(2)) < 0.2 }} 
          - condition: numeric_state
            entity_id: sun.sun
            attribute: elevation
            below: 5    
    variables:
      notification_action: notify.mobile_app_sm_a505fn
    actions:
# set to SG ready mode 3 solar boost input 1 on input 2 off
      - action: scene.apply
        data:
          entities:
            switch.stiebel_eltron_isg_sg_ready_input_1: "off"
      - action: scene.apply
        data:
          entities:
            switch.stiebel_eltron_isg_sg_ready_input_2: "off"
# activate SG ready function and send message            
      - action: scene.apply
        data:
          entities:
            input_boolean.sg_dummy_switch: "off"
      - action: "{{ notification_action }}"
        data:
          message: "SG ready deactivated"  

# SG boost can be ran once per day 
