# send message            
      - action: "{{ notification_action }}"
        data:
          message: "alarm triggered {% if is_state('binary_sensor.alarmsensor_5d1b24_hall_pir_front_door_contact', 'off') %}
          hall
          {% elif is_state('binary_sensor.alarmsensor_5d1b24_kitchen_pir', 'off') %}
          kitchen
          {% elif is_state('binary_sensor.alarmsensor_5d1b24_landing_pir', 'off') %}
          landing
          {% elif is_state('binary_sensor.alarmsensor_5d1b24_lounge_pir_contact', 'off') %}
