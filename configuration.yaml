automation trigger alarm:
  - alias: "trigger_alarm"    
    id: "automation_16"
    triggers:    
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_hall_pir_front_door_contact
        from: "on"   
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_kitchen_pir
        from: "on"           
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_landing_pir
        from: "on"     
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_lounge_pir_contact
        from: "on"     
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_music_room_pir
        from: "on"     
      - trigger: state
        entity_id: binary_sensor.alarmsensor_5d1b24_playroom_pir
