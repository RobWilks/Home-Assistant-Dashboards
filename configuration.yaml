automation soundDoorBell:
  - alias: "bingBong"
    id: "automation_10"
    trigger:
      - platform: state
        entity_id: siren.tapo_hub_7dea_siren
        to: "on"
        from: "off"
    actions:
      - variables:
          # Save the original volume level
          original_volume: "{{ state_attr('media_player.mouche', 'volume_level') | float(0.4) }}"
      - service: media_player.volume_set
        data:
          volume_level: 0.6 # Set your desired temporary volume level (e.g., 60%)
        target:
          entity_id: media_player.mouche
      - service: media_player.play_media
        data:
          media_content_id: http://192.168.1.28:8123/local/media/doorbell-2.mp3
          media_content_type: audio/mpeg 
        target:
          entity_id: media_player.mouche        
      - delay:
          seconds: 5 # Wait for a short period
      - service: media_player.volume_set
        data:
          # Restore the original volume level using the variable
          volume_level: "{{ original_volume }}"
        target:
          entity_id: media_player.mouche   
    
automation doorBellPrivacyOn:
  - alias: "privacyOn"
    id: "automation_11"
    trigger:
      - platform: state
        entity_id: binary_sensor.all_pir_sensors
        from: "on"
        to: "off"
        # PIR sensors break their circuit when triggered
      - platform: state
        entity_id: input_boolean.alarm_set
        to: "off"   
    condition:
      - condition: state
        entity_id: input_boolean.alarm_set
        state: "off"
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.all_pir_sensors
            state: "on"
          - condition: template
            # Checks if the PIR group was last changed less than 600 seconds (10 mins) ago
            value_template: >
              {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.all_pir_sensors.last_changed)) < 600 }}             
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.doorbell_privacy      
    mode: restart #if triggered several times reset the delay countdown

automation doorBellPrivacyOff:
    alias: "privacyOff"
    id: "automation_11b"
    description: "Turn off privacy if alarm is set or no motion for 30 mins"
    trigger:
      - platform: state
        entity_id: input_boolean.alarm_set
        to: "on"
      - platform: state
        entity_id: binary_sensor.all_pir_sensors
        to: "on"
        for:
          minutes: 30
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.doorbell_privacy
    mode: parallel


