 # https://www.home-assistant.io/integrations/recorder/
# strategy = store heat pump and solar data, but no data that is available in public domain
recorder:
  commit_interval: 20 # buffers the RW to the SD card
  purge_keep_days: 10
  include:
    entities:         # overides glob exclude
      - sensor.octopus_energy_electricity_19m1039794_1050003203800_export_previous_accumulative_consumption
      - sensor.octopus_energy_electricity_19m1039794_1050003203800_export_previous_accumulative_cost
      - sensor.octopus_energy_electricity_19m1039794_1030000402501_previous_accumulative_consumption
      - sensor.octopus_energy_electricity_19m1039794_1030000402501_previous_accumulative_cost
      - sensor.net_electricity_cost
      - sensor.fixedtariffexport
      - sensor.electricity_maps_co2_intensity
  exclude:
    domains:
      - automation
      - climate
      - conversation
      - media_player
      - person
      - sun
      - todo
      - tts
      - weather
      - zone 
    entity_globs:             #globs is a key to denote wildcard pattern
      - sensor.adc_*          #tests on esp32 adc
      - sensor.random_*       #random times for lights when away    
      - sensor.energy_*       #short-term forecast data
      - sensor.octopus_energy_electricity_19m1039794_1050003203800_*  #information on tariffs
      - sensor.electricity_maps*                                      #grid co2 intensity and share fossil fuel
      - sensor.sm_a505fn_*                                            #phone battery
      - sensor.tapo_hub_7dea_*
#      - sensor.alarm_*  #stats on the alarm sensors
      - sensor.*_year_ago  #sql queries on old values 
      - sensor.*year  #old data for year totals
      - sensor.stat_* #sql stats on the temperature sensors
      - sensor.dashboard_* #control update period for dashboard components
    entities:
      - sensor.stiebel_eltron_isg_actual_temperature_hk_1 #same data as buffer
      - sensor.stiebel_eltron_isg_target_temperature_hk_1
