- id: '1769980114046'
  alias: Update SQLrecords
  description: ''
  triggers:
  - trigger: time
    at: 04:56:00
  conditions: []
  actions:
  - action: homeassistant.update_entity
    metadata: {}
    data:
      entity_id:
      - sensor.stat_max_electricity_consumption
      - sensor.stat_max_grid_import
      - sensor.stat_max_load_import
      - sensor.stat_max_electricity_export
      - sensor.stat_max_hp_consumed
      - sensor.stat_max_produced_heating
      - sensor.stat_max_solar_export
      - sensor.stat_min_temperature_outdoor
      - sensor.stat_max_temperature_outdoor
      - sensor.stat_max_diurnal_range_outdoor
      - sensor.stat_max_daily_electricity_cost
      - sensor.stat_max_daily_electricity_export_cost
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - event: update_daily_records
    event_data: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.yesterday_new_records
      state:
      - No new records
      attribute: records
  - action: notify.mobile_app_sm_a505fn
    data:
      message: New record yesterday {{ state_attr('sensor.yesterday_new_records',
        'records') }}
  mode: single
