- id: '1749318240243'
  alias: Play BBC World Service
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - switch.shelly1minig3_3030f9ea7764_switch_0
    from: 'off'
    to: 'on'
  conditions: []
  actions:
  - action: media_player.play_media
    target:
      entity_id: media_player.mouche
    data:
      media_content_id: media-source://radio_browser/98adecf7-2683-4408-9be7-02d3f9098eb8
      media_content_type: audio/mpeg
    metadata:
      title: BBC World Service
      thumbnail: http://cdn-profiles.tunein.com/s24948/images/logoq.jpg?t=1
      media_class: music
      children_media_class:
      navigateIds:
      - {}
      - media_content_type: app
        media_content_id: media-source://radio_browser
