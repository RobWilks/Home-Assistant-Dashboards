  
  
# sum inverter power for each array
# individual inverters are grouped by array location and report value in W
# make sure it is a Sensor Group and check the box "Ignore non-numeric states". This stops error logs caused by sensor unavailable.
# we want total power per array in kW

# east array
- trigger:
    - platform: state
      entity_id: sensor.east_array
  sensor:
    - name: sumEastArray
      unique_id: a8044677-af37-47ad-a6e7-a845f31d27ad
      unit_of_measurement: "kW"
      device_class: power
      # We just take the group's sum and divide by 1000
      state: >
        {% set total = states('sensor.east_array') | float(0) %}
        {{ (total / 1000) | round(2) }}
      availability: >
        {{ is_number(states('sensor.east_array')) }}


