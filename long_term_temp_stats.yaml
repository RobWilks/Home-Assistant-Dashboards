# configuration.yaml to create sensor for daily temperature and humidity statistics
# configured via GUI since only this route permits change of polling interval

- name: stat_mean_temperature_kitchen
  query: >
    SELECT round(AVG(mean), 2) as mean_24, round(MIN(min), 2) as min_24, round(MAX(max), 2) as max_24
    FROM
      statistics_short_term INNER JOIN statistics_meta ON 
        statistics_short_term.metadata_id = statistics_meta.id 
    WHERE
      statistics_meta.statistic_id = 'sensor.atc_6a43_temperature' AND
      start_ts >= strftime('%s', 'now', '-1 day')
  column: "mean_24"        
  unit_of_measurement: "°C"
  device_class: "temperature"
  state_class: "measurement"
  unique_id: 997fdbe5-6438-4f1a-b639-fae2a73790af

