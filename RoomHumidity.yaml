                  {% set val =
                  state_attr('sensor.stat_mean_humidity_main_bedroom', 'min_24')
                  | float(none) %}  {{ val if val is not none else 'Attr Not
                  Found' }}
                secondary_info: none
                card_mod:
                  style:
                    ha-tile-info$: |
                      .primary {
                        color: white !important;
                        font-size: 24px !important;
                      }
                    .: |
                      ha-card {
                        {% set val = state_attr('sensor.stat_mean_humidity_main_bedroom', 'min_24') | float(none) %} 
                        {% if val is none %}
                          background: #404040 !important;
                        {% elif val < 40 %}
                          background: rgba(244, 208, 63, 0.6) !important;
                        {% elif val < 45 %}
                          background: rgba(162, 209, 73, 0.6) !important;
                        {% elif val < 50 %}
                          background: rgba(82, 190, 128, 0.6) !important;
                        {% elif val < 55 %}
                          background: rgba(39, 174, 96, 0.6) !important;
                        {% elif val < 60 %}
                          background: rgba(22, 160, 133, 0.6) !important;
                        {% elif val < 65 %}
                          background: rgba(41, 128, 185, 0.6) !important;
                        {% else %}
                          background: rgba(33, 97, 140, 0.6) !important;
                        {% endif %}                        


                        
                        /* This hides the icon container space */
                        --icon-size: 0px;

                        text-align: center;
                        align-items: center;
                      }    
