                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                card_mod:
                  style: |
                    :host {
                      --grid-card-gap: 0px !important;
                      --horizontal-stack-card-gap: 0px !important;
                    }
              - type: heading
                heading: "One day:\_\_\_Min\_\_\_Mean\_\_\_Max\_\_\_Now"
            grid_options:
              columns: 24
              rows: auto
        column_span: 4
      - type: grid
        cards:
          - type: heading
            heading: Main bedroom
            heading_style: subtitle
            icon: mdi:bed
            badges:
              - entity: sensor.atc_23b4_voltage
              - entity: sensor.atc_23b4_temperature
