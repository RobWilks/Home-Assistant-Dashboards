                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "55.0\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(22, 160, 133, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "60.0\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(41, 128, 185, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
