  - type: sections
    max_columns: 4
    title: Today
    path: today
    icon: mdi:water-percent
    sections:
      - type: grid
        cards:
          - type: heading
            heading: One day trends
            heading_style: title
          - type: custom:config-template-card
            entities:
              - sensor.dashboard_chart_refresh_fast
            variables:
              sorted_series: |
                states['sensor.atc_04d6_humidity'] ? (
                  [
                    {id: 'sensor.atc_23b4_humidity', name: 'Main bed', color: 'magenta'},
                    {id: 'sensor.atc_04d6_humidity', name: "Julia's room", color: 'dodgerblue'},
                    {id: 'sensor.atc_34ae_humidity', name: 'Music room', color: 'green'},
                    {id: 'sensor.stiebel_eltron_isg_humidity_hk_1', name: 'Hall', color: 'darkviolet'},
                    {id: 'sensor.lounge_humidity', name: 'Lounge', color: 'plum'},
                    {id: 'sensor.atc_632b_humidity', name: 'Bathroom', color: 'crimson'},
                    {id: 'sensor.atc_e6fc_humidity', name: 'Ensuite bathroom', color: 'goldenrod'},
                    {id: 'sensor.atc_6a43_humidity', name: 'Kitchen', color: 'yellowgreen'}
                  ]
                  .sort((a, b) => (parseFloat(states[b.id].state) || 0) - (parseFloat(states[a.id].state) || 0))
                  .map((room) => ({
                    entity: room.id,
                    name: room.name,
                    color: room.color
                  }))
                ) : []
            card:
              type: custom:apexcharts-card
              config_templates: grey_grid
              graph_span: 24h
              header:
                show: true
                title: House Humidity (%)
                show_states: false
              update_interval: 10m
              all_series_config:
                type: line
                curve: smooth
                stroke_width: 2
                opacity: 1
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 10m
              apex_config:
                legend:
                  show: true
                xaxis:
                  type: datetime
                  labels:
                    format: HH:mm
                yaxis:
                  min: 30
                  max: 70
                  tickAmount: 8
                  decimalsInFloat: 0
              series: ${vars.sorted_series}
          - type: custom:config-template-card
            entities:
              - sensor.dashboard_chart_refresh_fast
            variables:
              sorted_series: |
                states['sensor.atc_04d6_temperature'] ? (
                  [
                    {id: 'sensor.atc_23b4_temperature', name: 'Main bed', color: 'magenta'},
                    {id: 'sensor.atc_04d6_temperature', name: "Julia's room", color: 'dodgerblue'},
                    {id: 'sensor.atc_34ae_temperature', name: 'Music room', color: 'green'},
                    {id: 'sensor.stiebel_eltron_isg_actual_room_temperature_hk_1', name: 'Hall', color: 'darkviolet'},
                    {id: 'sensor.lounge_temperature', name: 'Lounge', color: 'plum'},
                    {id: 'sensor.diy_sensor_4b62_temperature', name: 'Office', color: 'turquoise'},
                    {id: 'sensor.atc_632b_temperature', name: 'Bathroom', color: 'crimson'},
                    {id: 'sensor.atc_e6fc_temperature', name: 'Ensuite bathroom', color: 'goldenrod'},
                    {id: 'sensor.atc_6a43_temperature', name: 'Kitchen', color: 'yellowgreen'}
                  ]
                  .sort((a, b) => (parseFloat(states[b.id].state) || 0) - (parseFloat(states[a.id].state) || 0))
                  .map((room) => ({
                    entity: room.id,
                    name: room.name,
                    color: room.color
                  }))
                ) : []
            card:
              type: custom:apexcharts-card
              config_templates: grey_grid
              graph_span: 24h
              header:
                show: true
                title: House Temperature (°C)
                show_states: false
              all_series_config:
