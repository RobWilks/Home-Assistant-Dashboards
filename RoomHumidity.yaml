apexcharts_card_templates:
  grey_grid:
    header:
      show: true
    apex_config:
      grid:
        position: back
        xaxis:
          lines:
            show: true
        yaxis:
          lines:
            show: true
        strokeDashArray: 0
        borderColor: '#404040'
      xaxis:
        axisBorder:
          show: true
          color: '#404040'
views:
  - title: Room humidity
    icon: mdi:home
    path: home
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: horizontal-stack
                cards:
                  - type: button
                    name: "\_\_\_\_<40"
                    show_name: true
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(244, 208, 63, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "40.0\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(162, 209, 73, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
