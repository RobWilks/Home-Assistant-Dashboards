apexcharts_card_templates:
  default:
    color_list:
      - dodgerblue
      - lawngreen
      - plum
      - crimson
      - goldenrod
  grey_grid:
    config_templates: default
    header:
      show: true
    apex_config:
      grid:
        position: back
        xaxis:
          lines:
            show: true
        yaxis:
          lines:
            show: true
        strokeDashArray: 0
        borderColor: '#404040'
      xaxis:
        axisBorder:
          show: true
          color: '#404040'
views:
  - title: Main dashboard
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: Energy and Power Today
            show_header_toggle: false
            state_color: true
            entities:
              - entity: sensor.sumeastarray
                type: custom:multiple-entity-row
                name: East Array
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.sumeastarray') | float(0) %}
                        {% if v >= 4.2 %} goldenrod {% elif v >= 3.5 %} yellow {% elif v >= 2.8 %} greenyellow 
                        {% elif v >= 2.1 %} turquoise {% elif v >= 1.4 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.sumeastarray') | float(0) %}
                        {% if v >= 4.2 %} goldenrod {% elif v >= 3.5 %} yellow {% elif v >= 2.8 %} greenyellow 
                        {% elif v >= 2.1 %} turquoise {% elif v >= 1.4 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.east_array_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.sumeastarray
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.sumsoutharray
                type: custom:multiple-entity-row
                name: South Array
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.sumsoutharray') | float(0) %}
                        {% if v >= 1.2 %} goldenrod {% elif v >= 1.0 %} yellow {% elif v >= 0.8 %} greenyellow 
                        {% elif v >= 0.6 %} turquoise {% elif v >= 0.4 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.sumsoutharray') | float(0) %}
                        {% if v >= 1.2 %} goldenrod {% elif v >= 1.0 %} yellow {% elif v >= 0.8 %} greenyellow 
                        {% elif v >= 0.6 %} turquoise {% elif v >= 0.4 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.south_array_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.sumsoutharray
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.sumwestarray
                type: custom:multiple-entity-row
                name: West Array
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.sumwestarray') | float(0) %}
                        {% if v >= 3.3 %} goldenrod {% elif v >= 2.75 %} yellow {% elif v >= 2.2 %} greenyellow 
                        {% elif v >= 1.65 %} turquoise {% elif v >= 1.1 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.sumwestarray') | float(0) %}
                        {% if v >= 3.3 %} goldenrod {% elif v >= 2.75 %} yellow {% elif v >= 2.2 %} greenyellow 
                        {% elif v >= 1.65 %} turquoise {% elif v >= 1.1 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.west_array_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.sumwestarray
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.wilkinsonsolar_solar_power
                type: custom:multiple-entity-row
                name: Total Generation
                icon: mdi:solar-power-variant-outline
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.wilkinsonsolar_solar_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.wilkinsonsolar_solar_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.solar_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.wilkinsonsolar_solar_power
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.wilkinsonsolar_load_power
                type: custom:multiple-entity-row
                name: House Load
                icon: mdi:home-lightning-bolt-outline
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.wilkinsonsolar_load_power') | float(0) %}
                        {% if v < 1 %} #808080 {% elif v < 2 %} deepskyblue {% elif v < 3 %} turquoise
                        {% elif v < 4 %} greenyellow {% elif v < 5 %} yellow {% elif v < 6 %} goldenrod
                        {% elif v < 7 %} darkorange {% else %} red {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.wilkinsonsolar_load_power') | float(0) %}
                        {% if v < 1 %} #808080 {% elif v < 2 %} deepskyblue {% elif v < 3 %} turquoise
                        {% elif v < 4 %} greenyellow {% elif v < 5 %} yellow {% elif v < 6 %} goldenrod
                        {% elif v < 7 %} darkorange {% else %} red {% endif %};
                      }
                entities:
                  - entity: sensor.load_import_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.wilkinsonsolar_load_power
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.grid_export_power
                type: custom:multiple-entity-row
                name: Grid Export
                icon: mdi:transmission-tower-export
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.grid_export_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.grid_export_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.grid_export_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.grid_export_power
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
              - entity: sensor.grid_import_power
                type: custom:multiple-entity-row
                name: Grid Import
                icon: mdi:transmission-tower-import
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.grid_import_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(2) {
                        color: {% set v = states('sensor.grid_import_power') | float(0) %}
                        {% if v >= 7.0 %} goldenrod {% elif v >= 5.5 %} yellow {% elif v >= 4.0 %} greenyellow 
                        {% elif v >= 2.5 %} turquoise {% elif v >= 1.0 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.grid_import_energy_today
                    name: ' '
                    format: precision1
                    styles:
                      color: '#808080'
                      width: 90px
                      text-align: right
                  - entity: sensor.grid_import_power
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
          - type: entities
            title: Forecast
            show_header_toggle: false
            entities:
              - entity: sensor.energy_production_today_remaining
                type: custom:multiple-entity-row
                name: PV E left
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.energy_production_today_remaining') | float(0) %}
                        {% if v >= 34 %} goldenrod {% elif v >= 28 %} greenyellow {% elif v >= 22 %} green 
                        {% elif v >= 17 %} turquoise {% elif v >= 11 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(1) {
                        color: {% set v = states('sensor.energy_production_today_remaining') | float(0) %}
                        {% if v >= 34 %} goldenrod {% elif v >= 28 %} greenyellow {% elif v >= 22 %} green 
                        {% elif v >= 17 %} turquoise {% elif v >= 11 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.energy_production_today_remaining
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
                  - entity: sun.sun
                    name: ' '
                    styles:
                      color: transparent
                      width: 90px
              - entity: sensor.energy_production_today_remaining_2
                type: custom:multiple-entity-row
                name: PV S left
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.energy_production_today_remaining_2') | float(0) %}
                        {% if v >= 10 %} goldenrod {% elif v >= 8 %} greenyellow {% elif v >= 6 %} green 
                        {% elif v >= 5 %} turquoise {% elif v >= 3 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(1) {
                        color: {% set v = states('sensor.energy_production_today_remaining_2') | float(0) %}
                        {% if v >= 10 %} goldenrod {% elif v >= 8 %} greenyellow {% elif v >= 6 %} green 
                        {% elif v >= 5 %} turquoise {% elif v >= 3 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.energy_production_today_remaining_2
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
                  - entity: sun.sun
                    name: ' '
                    styles:
                      color: transparent
                      width: 90px
              - entity: sensor.energy_production_today_remaining_3
                type: custom:multiple-entity-row
                name: PV W left
                icon: mdi:solar-panel-large
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.energy_production_today_remaining_3') | float(0) %}
                        {% if v >= 26 %} goldenrod {% elif v >= 22 %} greenyellow {% elif v >= 18 %} green 
                        {% elif v >= 13 %} turquoise {% elif v >= 9 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(1) {
                        color: {% set v = states('sensor.energy_production_today_remaining_3') | float(0) %}
                        {% if v >= 26 %} goldenrod {% elif v >= 22 %} greenyellow {% elif v >= 18 %} green 
                        {% elif v >= 13 %} turquoise {% elif v >= 9 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.energy_production_today_remaining_3
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
                  - entity: sun.sun
                    name: ' '
                    styles:
                      color: transparent
                      width: 90px
              - entity: sensor.total_solar_forecast_remaining
                type: custom:multiple-entity-row
                name: PV Forecast left
                icon: mdi:solar-power-variant-outline
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.total_solar_forecast_remaining') | float(0) %}
                        {% if v >= 56 %} goldenrod {% elif v >= 44 %} greenyellow {% elif v >= 32 %} green 
                        {% elif v >= 20 %} turquoise {% elif v >= 8 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(1) {
                        color: {% set v = states('sensor.total_solar_forecast_remaining') | float(0) %}
                        {% if v >= 56 %} goldenrod {% elif v >= 44 %} greenyellow {% elif v >= 32 %} green 
                        {% elif v >= 20 %} turquoise {% elif v >= 8 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.total_solar_forecast_remaining
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
                  - entity: sun.sun
                    name: ' '
                    styles:
                      color: transparent
                      width: 90px
              - entity: sensor.total_solar_forecast_tomorrow
                type: custom:multiple-entity-row
                name: PV Forecast tomorrow
                icon: mdi:solar-power-variant-outline
                show_state: false
                card_mod:
                  style:
                    hui-generic-entity-row $: |
                      state-badge {
                        color: {% set v = states('sensor.total_solar_forecast_tomorrow') | float(0) %}
                        {% if v >= 56 %} goldenrod {% elif v >= 44 %} greenyellow {% elif v >= 32 %} green 
                        {% elif v >= 20 %} turquoise {% elif v >= 8 %} deepskyblue {% else %} #808080 {% endif %} !important;
                      }
                    .: |
                      div.entity:nth-child(1) {
                        color: {% set v = states('sensor.total_solar_forecast_tomorrow') | float(0) %}
                        {% if v >= 56 %} goldenrod {% elif v >= 44 %} greenyellow {% elif v >= 32 %} green 
                        {% elif v >= 20 %} turquoise {% elif v >= 8 %} deepskyblue {% else %} #808080 {% endif %};
                      }
                entities:
                  - entity: sensor.total_solar_forecast_tomorrow
                    name: ' '
                    format: precision1
                    styles:
                      width: 90px
                      text-align: right
                  - entity: sun.sun
                    name: ' '
                    styles:
                      color: transparent
                      width: 90px
          - type: horizontal-stack
            cards:
              - type: button
                show_name: true
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: #808080 !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
              - type: button
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: deepskyblue !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
              - type: button
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: turquoise !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
              - type: button
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: greenyellow !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
              - type: button
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: yellow !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
              - type: button
                show_icon: false
                card_mod:
                  style: |
                    ha-card { 
                      background: goldenrod !important; 
                      height: 20px !important; 
                      font-size: 10px;
                      border-radius: 0px;
                      border: none;
                      margin: 0px !important;
                      color: black;
                    }
            card_mod:
              style: |
                :host {
                  --grid-card-gap: 0px !important;
                  --horizontal-stack-card-gap: 0px !important;
                }                      
          - type: custom:config-template-card
            entities:
              - sensor.total_solar_forecast_tomorrow
              - sensor.solar_energy_today
              - sensor.solarpvtoday7dmax
            variables:
              SOLAR_MAX: |
                states['sensor.solarpvtoday7dmax'].state === 'unavailable' || 
                states['sensor.solarpvtoday7dmax'].state === 'unknown' 
                ? '50.0' : states['sensor.solarpvtoday7dmax'].state
            card:
              type: custom:apexcharts-card
              config_templates: grey_grid
              apex_config:
                chart:
                  height: 300px
                yaxis:
                  max: ${Math.ceil(parseFloat(SOLAR_MAX) / 5) * 5}
                  decimalsInFloat: 0
                  forceNiceScale: true
                  min: 0
                legend:
                  show: false
                marker:
                  strokeWidth: 0
              graph_span: 14d
              span:
                end: day
                offset: +1day
              stacked: true
              header:
                show_states: true
                title: Solar production and Max/Min PV forecast by Day
                colorize_states: false
              all_series_config:
                stroke_width: 0
                show:
                  offset_in_name: false
              series:
                - entity: sensor.solar_energy_today
                  type: column
                  name: Solar production by day
                  group_by:
                    func: max
                    duration: 1day
                  show:
                    in_header: true
                  color: goldenrod
                - entity: sensor.total_solar_forecast_tomorrow
                  type: column
                  name: PV forecast min
                  offset: '-1day'
                  group_by:
                    func: min
                    duration: 1day
                  opacity: 0
                  stack_group: forecast
                  show:
                    in_header: true
                - entity: sensor.total_solar_forecast_tomorrow
                  type: column
                  name: PV forecast delta
                  offset: '-1day'
                  group_by:
                    func: delta
                    duration: 1day
                  stack_group: forecast
                  show:
                    in_header: false
          - type: custom:config-template-card
            entities:
              - sensor.total_solar_forecast_tomorrow
              - sensor.solar_energy_today
              - sensor.solarpvtoday7dmax
            variables:
              SOLAR_MAX: |
                states['sensor.solarpvtoday7dmax'].state === 'unavailable' || 
                states['sensor.solarpvtoday7dmax'].state === 'unknown' 
                ? '50.0' : states['sensor.solarpvtoday7dmax'].state
            card:
              type: custom:apexcharts-card
              config_templates: grey_grid
              apex_config:
                chart:
                  height: 300px
                yaxis:
                  max: ${Math.ceil(parseFloat(SOLAR_MAX) / 5) * 5}
                  decimalsInFloat: 0
                  forceNiceScale: true
                  min: 0
                marker:
                  strokeWidth: 0
              graph_span: 14d
              span:
                end: day
                offset: +1day
              stacked: false
              header:
                title: PV forecast vs production
              all_series_config:
                type: line
                stroke_width: 1
                show:
                  extremas: true
                  offset_in_name: false
                extend_to: false
              series:
                - entity: sensor.total_solar_forecast_tomorrow
                  name: PV forecast
                  offset: '-1day'
                  color: plum
                  curve: smooth
                - entity: sensor.solar_energy_today
                  name: Solar production
                  color: goldenrod
                  curve: stepline
      - type: vertical-stack
        cards:
          - type: custom:config-template-card
            entities:
              - >-
                sensor.octopus_energy_electricity_19m1039794_1030000402501_previous_accumulative_cost
              - >-
                sensor.octopus_energy_electricity_19m1039794_1050003203800_export_previous_accumulative_cost
            variables:
              PRICE_MAX: states['sensor.electricitycost14dmax'].state
            card:
              type: custom:apexcharts-card
              config_templates: grey_grid
              apex_config:
                chart:
                  height: 200px
                yaxis:
                  max: ${Math.ceil(parseFloat(PRICE_MAX) / 2) * 2}
                  decimalsInFloat: 0
                  forceNiceScale: true
              graph_span: 14d
              span:
                end: day
              header:
                title: Electricity Import and Export (£)
              all_series_config:
                offset: +1day
                stroke_width: 1
                show:
                  extremas: true
                  offset_in_name: false
              series:
                - entity: >-
                    sensor.octopus_energy_electricity_19m1039794_1030000402501_previous_accumulative_cost
                  color: magenta
                  type: column
                  name: Import cost (£)
                  statistics:
                    type: state
                    period: day
                - entity: >-
                    sensor.octopus_energy_electricity_19m1039794_1050003203800_export_previous_accumulative_cost
                  color: deeppink
                  type: column
                  name: Export cost (£)
                  statistics:
                    type: state
                    period: day
          - type: custom:apexcharts-card
            config_templates: grey_grid
            apex_config:
              chart:
                height: 200px
              yaxis:
                decimalsInFloat: 0
                forceNiceScale: true
              plotOptions:
                bar:
                  columnWidth: 40%
            graph_span: 14d
            span:
              end: day
            header:
              title: Electricity Export - Import (£)
            all_series_config:
              offset: +1day
              stroke_width: 1
              show:
                extremas: true
                offset_in_name: false
            series:
              - entity: sensor.net_electricity_cost
                yaxis_id: day
                float_precision: 2
                type: column
                name: Export - Import cost (£)
                color: darkviolet
                statistics:
                  type: state
                  period: day
      - type: vertical-stack
        cards:
          - type: custom:apexcharts-card
            config_templates: grey_grid
            graph_span: 1d
            apex_config:
              chart:
                height: 600px
            header:
              title: Grid Import/Export, PV production and Load
            yaxis:
              - id: power
                min: -6
                max: 6
                decimals: 0
                apex_config:
                  tickAmount: 6
                  axisBorder:
                    show: true
                    color: '#404040'
            all_series_config:
              stroke_width: 1
              extend_to: false
              show:
                extremas: true
            series:
              - entity: sensor.wilkinsonsolar_site_power
                name: Grid export
                yaxis_id: power
                type: line
                curve: straight
                invert: true
                color: magenta
              - entity: sensor.wilkinsonsolar_solar_power
                name: Solar Production
                yaxis_id: power
                type: line
                curve: straight
                color: goldenrod
              - entity: sensor.wilkinsonsolar_load_power
                name: Load
                yaxis_id: power
                type: line
                curve: straight
                color: turquoise
          - type: custom:apexcharts-card
            config_templates: grey_grid
            apex_config:
              chart:
                height: 200px
            graph_span: 1d
            header:
              show: true
              title: Battery charge %
            yaxis:
              - id: percent
                min: 0
                max: 100
                decimals: 0
                apex_config:
                  axisBorder:
                    show: true
                    color: '#404040'
            all_series_config:
