  
  
# sum inverter power for each array
# individual inverters are grouped by array location and report value in W
# we want total power per array in kW

# east array
  - trigger: 
      trigger: state
      entity_id: 
        - sensor.inverter_512321029114
        - sensor.inverter_512321029062
        - sensor.inverter_512321028846
        - sensor.inverter_512321028554
        - sensor.inverter_512321028469
        - sensor.inverter_512321028344
        - sensor.inverter_512321028251
        - sensor.inverter_512321027856
        - sensor.inverter_512321027854
        - sensor.inverter_512321027555
        - sensor.inverter_512321027378
        - sensor.inverter_512321027233
        - sensor.inverter_512321026830
        - sensor.inverter_512321026009  
    sensor:
    - name: sumEastArray
      unique_id: a8044677-af37-47ad-a6e7-a845f31d27ad
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {% set res =  expand('sensor.east_array') | map(attribute='state') | map('float',default=0) | sum %}
        {{ res / 1000 }}

