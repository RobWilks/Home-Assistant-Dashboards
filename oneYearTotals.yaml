# Envoy lifetime sensors yearly totals
# unit MWh converted to kWh
# Envoy data are intermittent so use old value if current is unavailable
# Year-old value updates daily using Update SQL entities in automation.yaml

  - trigger:
    - platform: time_pattern
      # This will trigger every 10 minutes
      minutes: "/10"
    sensor:
    - name: "energy_consumption_year"
      unique_id: 091ca257-cccb-4774-8131-a436b38427ab
      unit_of_measurement: "kWh"
      state: >
        {% set current = states('sensor.envoy_482333049062_lifetime_energy_consumption') %}
        {% set old = states('sensor.energy_consumption_year_ago') %}
        {% if (current not in ['unavailable', 'unknown']) and 
              (old not in ['unavailable', 'unknown']) %}
            {{ (((current | float(0)) - (old | float(0))) * 1000) | round(-1) }}
        {% else %}
          {{ this.state | float(0) }}
        {% endif %}

