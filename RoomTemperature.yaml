                stroke_width: 2
                opacity: 1
                show:
                  legend_value: false
                group_by:
                  func: avg
                  duration: 5m
              apex_config:
                legend:
                  show: true
                xaxis:
                  type: datetime
                  labels:
                    format: HH:mm
                yaxis:
