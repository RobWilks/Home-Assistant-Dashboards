apexcharts_card_templates:
  grey_grid:
    header:
      show: true
    apex_config:
      grid:
        position: back
        xaxis:
          lines:
            show: true
        yaxis:
          lines:
            show: true
        strokeDashArray: 0
        borderColor: '#404040'
      xaxis:
        axisBorder:
          show: true
          color: '#404040'
views:
  - title: Room Temperature
    icon: mdi:home
    path: home
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: horizontal-stack
                cards:
                  - show_name: true
                    show_icon: false
                    type: button
                    name: "\_\_\_\_<18"
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(0, 204, 255, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "18.0\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(0, 255, 204, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "18.5\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(204, 255, 0, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "19.0\_\_\_\_\_\_"
                    show_icon: false
