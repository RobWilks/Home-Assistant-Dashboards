                          background: rgba(255, 255, 0, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "19.5\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(255, 204, 0, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: "20.0\_\_\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(255, 102, 0, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                  - type: button
                    name: ">20.5\_\_\_\_"
                    show_icon: false
                    card_mod:
                      style: |
                        ha-card { 
                          background: rgba(255, 0, 0, 0.6) !important; 
                          height: 30px !important; 
                          font-size: 10px;
                          border-radius: 0px;
                          border: none;
                          margin: 0 !important;
                        }
                card_mod:
                  style: |
                    :host {
                      --grid-card-gap: 0px !important;
                      --horizontal-stack-card-gap: 0px !important;
                    }
              - type: heading
                heading: "One day:\_\_\_Min\_\_\_Mean\_\_\_Max\_\_\_Now"
            grid_options:
              columns: 24
              rows: auto
        column_span: 4
      - type: grid
        cards:
          - type: heading
            heading: Main bedroom
            heading_style: subtitle
            icon: mdi:bed
            badges:
              - entity: sensor.atc_23b4_voltage
              - entity: sensor.atc_23b4_humidity
            tap_action:
              action: navigate
              navigation_path: areas-ensuite
          - square: false
            type: grid
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.stat_mean_temperature_main_bedroom
                name: ''
                grid_options:
                  columns: 3
                  rows: 1
                primary: >
                  {% set val =
                  state_attr('sensor.stat_mean_temperature_main_bedroom',
                  'min_24') | float(none) %}  {{ val if val is not none else
                  'Attr Not Found' }}
                secondary_info: none
                card_mod:
                  style:
                    ha-tile-info$: |
                      .primary {
                        color: white !important;
                        font-size: 24px !important;
                      }
                    .: |
                      ha-card {
                        {% set val = state_attr('sensor.stat_mean_temperature_main_bedroom', 'min_24') | float(none) %} 
                        {% if val is none %}
                          background: #404040 !important;
                        {% elif val < 18.0 %}
                          background: rgba(0, 204, 255, 0.6) !important;
                        {% elif val < 18.5 %}
                          background: rgba(0, 255, 204, 0.6) !important;
                        {% elif val < 19.0 %}
                          background: rgba(204, 255, 0, 0.6) !important;
                        {% elif val < 19.5 %}
                          background: rgba(255, 255, 0, 0.6) !important;
                        {% elif val < 20.0 %}
                          background: rgba(255, 204, 0, 0.6) !important;
                        {% elif val < 20.5 %}
                          background: rgba(255, 102, 0, 0.6) !important;
                        {% else %}
                          background: rgba(255, 0, 0, 0.6) !important;
                        {% endif %}


                        
                        /* This hides the icon container space */
                        --icon-size: 0px;

                        text-align: center;
                        align-items: center;
                      }    
