            variables:
              sorted_series: |
                states['sensor.atc_04d6_temperature'] ? (
                  [
                    {id: 'sensor.atc_23b4_temperature', name: 'Ensuite', color: 'magenta'},
                    {id: 'sensor.atc_04d6_temperature', name: "Julia's room", color: 'dodgerblue'},
                    {id: 'sensor.atc_34ae_temperature', name: 'Music room', color: 'green'},
                    {id: 'sensor.stiebel_eltron_isg_actual_room_temperature_hk_1', name: 'Hall', color: 'darkviolet'},
                    {id: 'sensor.lounge_temperature', name: 'Lounge', color: 'plum'},
                    {id: 'sensor.diy_sensor_4b62_temperature', name: 'Office', color: 'turquoise'},
                    {id: 'sensor.atc_632b_temperature', name: 'Bathroom', color: 'crimson'},
                    {id: 'sensor.atc_e6fc_temperature', name: 'Ensuite bathroom', color: 'goldenrod'},
                    {id: 'sensor.atc_6a43_temperature', name: 'Kitchen', color: 'yellowgreen'}
                  ]
                  .sort((a, b) => (parseFloat(states[b.id].state) || 0) - (parseFloat(states[a.id].state) || 0))
                  .map((room) => ({
                    entity: room.id,
                    name: room.name,
                    color: room.color
                  }))
